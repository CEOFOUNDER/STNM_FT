name: Security scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-pattern-scan:
    name: Secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for high-risk secret patterns
        shell: bash
        run: |
          set -euo pipefail
          patterns='(ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{80,}|sk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |OPENSSH |EC |)PRIVATE KEY-----|client_secret|api[_-]?key|access[_-]?token|refresh[_-]?token|password[[:space:]]*[=:])'
          if grep -RInE "$patterns" \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude='security-scan.yml' \
            .; then
            echo "Potential secret-like content found. Review before publishing."
            exit 1
          fi
          echo "No high-risk secret patterns found."
