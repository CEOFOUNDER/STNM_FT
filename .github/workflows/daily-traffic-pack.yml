name: Generate daily STNM traffic pack

on:
  schedule:
    - cron: "5 6 * * *"
    - cron: "35 7 * * *"
  push:
    paths:
      - ".github/workflows/daily-traffic-pack.yml"
      - "scripts/generate-traffic-pack.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate traffic pack
        run: node scripts/generate-traffic-pack.js

      - name: Commit generated pack
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add traffic-console/generated/daily-pack.json traffic-console/generated/latest-brief.md
          git diff --cached --quiet || git commit -m "Generate daily STNM traffic pack"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
