name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply approved diagnostic PDF attachment delivery
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Missing expected text in {path}: {old[:100]!r}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          pdf_helpers = r'''    function pdfSafeText(text){
      return String(text || "").replace(/[^\x09\x0A\x0D\x20-\x7E]/g, " ");
    }
    function pdfEscape(text){
      return pdfSafeText(text).replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
    }
    function wrapPdfLines(text, width){
      const lines = [];
      pdfSafeText(text).split(/\r?\n/).forEach(line => {
        const words = line.split(/\s+/).filter(Boolean);
        if(!words.length){ lines.push(""); return; }
        let current = "";
        words.forEach(word => {
          const next = current ? current + " " + word : word;
          if(next.length > width && current){ lines.push(current); current = word; }
          else { current = next; }
        });
        if(current) lines.push(current);
      });
      return lines;
    }
    function buildAssessmentPdfBlob(summary){
      const title = "SEE THE NEXT MOVE - AI Finance Diagnostic Assessment";
      const lines = [title, "", "Generated from the paid-session diagnostic preparation tool.", "", ...wrapPdfLines(summary, 88)];
      const perPage = 44;
      const pages = [];
      for(let i = 0; i < lines.length; i += perPage) pages.push(lines.slice(i, i + perPage));
      const objects = [];
      const add = value => { objects.push(value); return objects.length; };
      const catalogId = add("<< /Type /Catalog /Pages 2 0 R >>");
      const pagesId = add("");
      const fontId = add("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>");
      const pageIds = [];
      pages.forEach(pageLines => {
        const content = "BT\n/F1 10 Tf\n50 790 Td\n14 TL\n" + pageLines.map(line => "(" + pdfEscape(line) + ") Tj").join("\nT*\n") + "\nET";
        const contentId = add("<< /Length " + content.length + " >>\nstream\n" + content + "\nendstream");
        const pageId = add("<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 " + fontId + " 0 R >> >> /Contents " + contentId + " 0 R >>");
        pageIds.push(pageId);
      });
      objects[pagesId - 1] = "<< /Type /Pages /Kids [" + pageIds.map(id => id + " 0 R").join(" ") + "] /Count " + pageIds.length + " >>";
      let pdf = "%PDF-1.4\n";
      const offsets = [0];
      objects.forEach((obj, index) => {
        offsets.push(pdf.length);
        pdf += (index + 1) + " 0 obj\n" + obj + "\nendobj\n";
      });
      const xref = pdf.length;
      pdf += "xref\n0 " + (objects.length + 1) + "\n0000000000 65535 f \n";
      for(let i = 1; i < offsets.length; i++) pdf += String(offsets[i]).padStart(10, "0") + " 00000 n \n";
      pdf += "trailer\n<< /Size " + (objects.length + 1) + " /Root " + catalogId + " 0 R >>\nstartxref\n" + xref + "\n%%EOF";
      return new Blob([pdf], { type: "application/pdf" });
    }
    function attachAssessmentPdf(form, summary){
      if(typeof File === "undefined" || typeof DataTransfer === "undefined") throw new Error("This browser cannot attach the generated PDF.");
      const file = new File([buildAssessmentPdfBlob(summary)], "AI-Finance-Diagnostic-Assessment.pdf", { type: "application/pdf" });
      const transfer = new DataTransfer();
      transfer.items.add(file);
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.name = "assessment_pdf";
      fileInput.files = transfer.files;
      fileInput.style.display = "none";
      form.appendChild(fileInput);
    }
'''
          replace(
              'ai-finance-diagnostic-tool/index.html',
              '    function sendReportEmail(){',
              pdf_helpers + '    function sendReportEmail(){'
          )
          replace(
              'ai-finance-diagnostic-tool/index.html',
              '      status.textContent = "Sending report...";\n      const form = document.createElement("form");\n      form.method = "POST";\n      form.action = "https://formsubmit.co/" + encodeURIComponent(email);\n      form.target = "emailSink";\n      form.style.display = "none";',
              '      status.textContent = "Sending report and PDF...";\n      const form = document.createElement("form");\n      form.method = "POST";\n      form.enctype = "multipart/form-data";\n      form.action = "https://formsubmit.co/" + encodeURIComponent(email);\n      form.target = "emailSink";\n      form.style.display = "none";'
          )
          replace(
              'ai-finance-diagnostic-tool/index.html',
              '        recipient_email: recipient,\n        report_summary: latestEmailBody',
              '        recipient_email: recipient,\n        report_summary: latestEmailBody,\n        report_pdf: "AI-Finance-Diagnostic-Assessment.pdf"'
          )
          replace(
              'ai-finance-diagnostic-tool/index.html',
              '      document.body.appendChild(form);\n      form.submit();\n      status.textContent = "Report sent. This page will now close.";',
              '      try {\n        attachAssessmentPdf(form, latestEmailBody);\n      } catch(error) {\n        status.style.color = "var(--red)";\n        status.textContent = "The PDF could not be attached in this browser. Please try again in Chrome or Edge.";\n        return;\n      }\n      document.body.appendChild(form);\n      form.submit();\n      status.textContent = "Report and PDF sent. This page will now close.";'
          )
          replace(
              'docs/STNM_WEBSITE_SPEC.md',
              '- It must preserve the paid-session preparation boundary: complete before the paid session, generate a report, route report delivery to `gilles.bonelli@seethenextmove.com`, and use the approved `$750` Diagnostic Pack booking URL.',
              '- It must preserve the paid-session preparation boundary: complete before the paid session, generate a report, attach the final assessment PDF to report delivery, route report delivery to `gilles.bonelli@seethenextmove.com`, copy the client email address, and use the approved `$750` Diagnostic Pack booking URL.'
          )
          replace(
              'references/regression-rules.md',
              '- Diagnostic questions, scoring, report generation, report delivery, and paid-session preparation copy are under guardrail control and must be checked before publishing.',
              '- Diagnostic questions, scoring, report generation, PDF assessment attachment, report delivery, and paid-session preparation copy are under guardrail control and must be checked before publishing.'
          )
          PY
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('ai-finance-diagnostic-tool/index.html').read_text(encoding='utf-8')
          required = [
              'function buildAssessmentPdfBlob',
              'function attachAssessmentPdf',
              'AI-Finance-Diagnostic-Assessment.pdf',
              'form.enctype = "multipart/form-data"',
              'assessment_pdf',
              'Report and PDF sent',
              '_cc: recipient',
              'formsubmit.co'
          ]
          missing = [item for item in required if item not in html]
          if missing:
              raise SystemExit('Missing diagnostic PDF markers: ' + ', '.join(missing))
          script = re.search(r'<script>([\s\S]*?)</script>', html).group(1)
          Path('/tmp/diagnostic.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/diagnostic.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet ai-finance-diagnostic-tool/index.html docs/STNM_WEBSITE_SPEC.md references/regression-rules.md; then
            echo "Diagnostic PDF attachment changes already applied"
          else
            git add ai-finance-diagnostic-tool/index.html docs/STNM_WEBSITE_SPEC.md references/regression-rules.md
            git commit -m "Attach PDF assessment to diagnostic email"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
